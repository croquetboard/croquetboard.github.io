<!DOCTYPE html>

<html>
    <head>
        <title>croquet balls</title>

        <style>
            :root {
                --background: hsl(0, 0%, 70%);
                --lawn: hsl(0, 0%, 80%);
                --hoop: hsl(0, 0%, 40%);
                --black: hsl(0, 0%, 20%);
                --blue: hsl(216, 60%, 35%);
                --red: hsl(3, 60%, 40%);
                --yellow: hsl(50, 60%, 35%);
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                height: 100%;
                width: 100%;
            }

            body {
                background-color: var(--background);
                display: grid;
                height: 100%;
                justify-items: center;
                width: 100%;
            }

            #gameCanvas {
                height: 100%;
                width: 100%;
            }

            #gameArea {
                position: absolute;
                left: 50%;
                top: 50%;
            }
        </style>
    </head>

    <body>
        <div id="gameArea">
            <canvas id="gameCanvas"></canvas>
        </div>

        <script type="text/javascript">
            var gameArea = document.getElementById("gameArea");
            var gameCanvas = document.getElementById("gameCanvas");
            var context = document.getElementById("gameCanvas").getContext("2d");

            var yard;

            var draggingBall = -1;
            var draggingOffsetX;
            var draggingOffsetY;

            var balls;

            function getColor(name) {
                return getComputedStyle(document.documentElement).getPropertyValue("--" + name);
            }

            function fillCircle(context, x, y, radius, color) {
                context.fillStyle = color;
                context.beginPath();
                context.arc(x, y, radius, 0, Math.PI * 2);
                context.fill();
            }

            function resizeGame() {
                var widthToHeight = 4 / 5;
                var newWidth = window.innerWidth;
                var newHeight = window.innerHeight;
                var newWidthToHeight = newWidth / newHeight;

                if (newWidthToHeight > widthToHeight) {
                    newWidth = newHeight * widthToHeight;
                    gameArea.style.height = newHeight + "px";
                    gameArea.style.width = newWidth + "px";
                } else {
                    newHeight = newWidth / widthToHeight;
                    gameArea.style.width = newWidth + "px";
                    gameArea.style.height = newHeight + "px";
                }

                gameArea.style.marginTop = -newHeight / 2 + "px";
                gameArea.style.marginLeft = -newWidth / 2 + "px";

                gameCanvas.width = newWidth;
                gameCanvas.height = newHeight;

                yard = gameCanvas.width / 28;

                var radius = 0.4 * yard;
                balls = [
                    { x: (28 / 2 - 4) * yard, y: (35 / 2) * yard, radius: radius, color: "black" },
                    { x: (28 / 2 - 2) * yard, y: (35 / 2) * yard, radius: radius, color: "blue" },
                    { x: (28 / 2 + 2) * yard, y: (35 / 2) * yard, radius: radius, color: "red" },
                    { x: (28 / 2 + 4) * yard, y: (35 / 2) * yard, radius: radius, color: "yellow" },
                ];

                draw();
            }

            resizeGame();

            function collideCircle(circle1, circle2) {
                var distance_x = circle1.x - circle2.x;
                var distance_y = circle1.y - circle2.y;
                var radii_sum = circle1.radius + circle2.radius;
                return distance_x * distance_x + distance_y * distance_y <= radii_sum * radii_sum;
            }

            function resolveCircle(c1, c2) {
                var distance_x = c1.x - c2.x;
                var distance_y = c1.y - c2.y;
                var radii_sum = c1.radius + c2.radius;
                var length = Math.sqrt(distance_x * distance_x + distance_y * distance_y) || 1;
                var unit_x = distance_x / length;
                var unit_y = distance_y / length;

                c1.x = c2.x + (radii_sum + 1) * unit_x;
                c1.y = c2.y + (radii_sum + 1) * unit_y;
            }

            function collideAndResolve(circle1, circle2) {
                if (collideCircle(circle1, circle2)) {
                    resolveCircle(circle1, circle2);
                }
            }

            function distanceBetweenPoints(x1, y1, x2, y2) {
                var a = x1 - x2;
                var b = y1 - y2;
                var c = Math.hypot(a, b);
                return c;
            }

            function drawHoop(x, y) {
                var w = yard;
                var h = 0.15 * yard;
                var ax = x * yard - w / 2;
                var ay = y * yard - h / 2;
                context.fillStyle = getColor("hoop");
                context.fillRect(ax, ay, w, h);
            }

            function draw() {
                context.fillStyle = getColor("lawn");
                context.fillRect(0, 0, context.canvas.width, context.canvas.height);

                for (var i = 0; i < balls.length; i++) {
                    var a = balls[i];
                    fillCircle(context, a.x, a.y, a.radius, getColor(a.color));
                }

                drawHoop(7, 7);
                drawHoop(28 - 7, 7);
                drawHoop(7, 35 - 7);
                drawHoop(28 - 7, 35 - 7);
                drawHoop(7 + 7, 7 + 3.5);
                drawHoop(7 + 7, 35 - 7 - 3.5);
                fillCircle(context, (28 / 2) * yard, (35 / 2) * yard, 0.15 * yard, getColor("hoop"));
            }

            function handleInput(event) {
                event.preventDefault();

                var x = undefined;
                var y = undefined;

                switch (event.type) {
                    case "touchend":
                    case "touchmove":
                    case "touchstart":

                        if (event.targetTouches.length > 0) {
                            x = event.targetTouches[0].clientX;
                            y = event.targetTouches[0].clientY;
                        }

                        break;
                    default:
                        x = event.clientX;
                        y = event.clientY;
                }

                var canvas_rectangle = context.canvas.getBoundingClientRect();
                x -= canvas_rectangle.left;
                y -= canvas_rectangle.top;
                
                x = Math.min(Math.max(x, 0), gameCanvas.width);
                y = Math.min(Math.max(y, 0), gameCanvas.height);

                if (event.type == "mousedown" || event.type == "touchstart") {
                    var closestDistance = Number.MAX_VALUE;
                    var closestBall;

                    for (var i = 0; i < balls.length; i++) {
                        var a = balls[i];
                        var d = distanceBetweenPoints(x, y, a.x, a.y);
                        if (d < closestDistance) {
                            closestBall = i;
                            closestDistance = d;
                            closestOffsetX = x - a.x;
                            closestOffsetY = y - a.y;
                        }
                    }

                    if (closestDistance < 5 * yard) {
                        draggingBall = closestBall;
                        draggingOffsetX = closestOffsetX;
                        draggingOffsetY = closestOffsetY;
                    }
                }

                if (event.type == "mouseup" || event.type == "touchend" || event.type == "mouseleave") {
                    draggingBall = -1;
                }

                if (event.type == "mousemove" || event.type == "touchmove") {
                    if (draggingBall != -1) {
                        balls[draggingBall].x = x - draggingOffsetX;
                        balls[draggingBall].y = y - draggingOffsetY;

                        for (var i = 0; i < balls.length; i++) {
                            if (i == draggingBall) {
                                continue;
                            }
                            collideAndResolve(balls[draggingBall], balls[i]);
                        }
                    }
                }

                draw();
            }

            window.addEventListener("resize", resizeGame, false);
            window.addEventListener("orientationchange", resizeGame, false);

            context.canvas.addEventListener("mousemove", handleInput, { passive: false });
            context.canvas.addEventListener("mousedown", handleInput, { passive: false });
            context.canvas.addEventListener("mouseup", handleInput, { passive: false });
            context.canvas.addEventListener("mouseleave", handleInput, { passive: false });

            context.canvas.addEventListener("touchend", handleInput, { passive: false });
            context.canvas.addEventListener("touchmove", handleInput, { passive: false });
            context.canvas.addEventListener("touchstart", handleInput, { passive: false });

            function setFavicon() {
                var canvas = document.createElement("canvas");
                canvas.width = 16;
                canvas.height = 16;
                var context = canvas.getContext("2d");
                fillCircle(context, 8, 8, 8, getColor("blue"));
                var link = document.createElement("link");
                link.type = "image/x-icon";
                link.rel = "shortcut icon";
                link.href = canvas.toDataURL("image/x-icon");
                document.getElementsByTagName("head")[0].appendChild(link);
            }

            setFavicon();
        </script>
    </body>
</html>
